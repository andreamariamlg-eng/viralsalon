<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — ViralSalon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold-light:#E8CB7A;--gold-dark:#8a6c28;--black:#000;--black3:#141414;--black4:#1E1E1E;--white:#FFF;--white-dim:rgba(255,255,255,0.7);--border:rgba(201,168,76,0.2);--border-strong:rgba(201,168,76,0.5)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-size:1.8rem;font-weight:900;margin-bottom:8px;text-align:center}
.logo span{color:var(--gold)}
.logo-sub{font-size:0.8rem;color:var(--white-dim);text-align:center;margin-bottom:40px}
.card{background:var(--black3);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:480px}
.card h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.card p{font-size:0.83rem;color:var(--white-dim);margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:0}
.form-group.full{grid-column:1/-1}
label{font-size:0.73rem;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
input,select{background:var(--black4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--white);padding:12px 14px;font-size:0.95rem;font-family:inherit;width:100%;transition:border-color 0.2s}
input:focus,select:focus{outline:none;border-color:var(--gold);background:#1a1500}
select option{background:#1a1a1a}
.btn{width:100%;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));color:#000;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:900;cursor:pointer;margin-top:20px;font-family:inherit}
.btn:hover{opacity:0.9}
.link{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--white-dim)}
.link a{color:var(--gold);text-decoration:none;font-weight:700}
.alert{background:#120404;border:1px solid rgba(200,74,74,0.3);border-radius:8px;padding:12px 16px;color:#e87a7a;margin-bottom:16px;font-size:0.88rem}
.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>
<div class="logo">Viral<span>Salon</span></div>
<div class="logo-sub">by Andrea Maria</div>
<div class="card">
  <h2>Crear cuenta gratis</h2>
  <p>Empieza a generar guiones virales para tu salón hoy mismo.</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Nombre del salón *</label>
        <input type="text" name="nombre_salon" placeholder="Golden Hall Beauty" required>
      </div>
      <div class="form-group full">
        <label>Email *</label>
        <input type="email" name="email" placeholder="tu@email.com" required>
      </div>
      <div class="form-group full">
        <label>Contraseña *</label>
        <input type="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8">
      </div>
      <div class="divider" style="grid-column:1/-1"></div>
      <div class="form-group">
        <label>Especialidad</label>
        <select name="especialidad">
          <option value="">Elige tu especialidad</option>
          <option>Peluquería</option>
          <option>Estética y Tratamientos Faciales</option>
          <option>Uñas y Nail Art</option>
          <option>Cejas y Pestañas</option>
          <option>Centro Integral de Belleza</option>
          <option>Micropigmentación</option>
          <option>Extensiones de Cabello</option>
          <option>Láser y Depilación</option>
          <option>Masajes y Spa</option>
          <option>Maquillaje Profesional</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ciudad</label>
        <input type="text" name="ciudad" placeholder="Sevilla">
      </div>
    </div>
    <button type="submit" class="btn">Crear mi cuenta gratis</button>
  </form>
  <div class="link">¿Ya tienes cuenta? <a href="/login">Entrar</a></div>
</div>
</body>
</html>
